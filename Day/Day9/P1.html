<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Data Types Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }
    .card {
      background: #fff;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      margin-top: 0;
    }
    .label {
      font-weight: bold;
      margin-top: 10px;
    }
    .value {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>User Profile</h2>

    <div class="label">Name:</div>
    <div class="value" id="name">-</div>

    <div class="label">Age:</div>
    <div class="value" id="age">-</div>

    <div class="label">Total Orders:</div>
    <div class="value" id="totalOrders">-</div>

    <div class="label">Is Active:</div>
    <div class="value" id="isActive">-</div>

    <div class="label">Address:</div>
    <div class="value" id="address">-</div>

    <div class="label">Hobbies:</div>
    <div class="value" id="hobbies">-</div>

    <div class="label">Insurance Plan:</div>
    <div class="value" id="insurance">-</div>

    <div class="label">Consent Given:</div>
    <div class="value" id="consent">-</div>

    <div class="label">Last Login:</div>
    <div class="value" id="lastLogin">-</div>

    <div class="label">Debug Info:</div>
    <div class="value" id="debugInfo">-</div>
  </div>

  <script>
    // Strings
    let name = "Bharath";
    let city = "Bengaluru";
    let address = city + ", India";

    // Numbers
    let age = 19;
    let totalOrders = 12;

    // BigInt
    let totalSpent = 12345678901234567890n;

    // Boolean
    let isActive = true;
    let consentGiven = false;

    // Undefined
    let lastLogin; // not assigned yet

    // Null
    let insurance = null; // no insurance yet

    // Object
    let user = {
      name: name,
      age: age,
      address: address,
      interests: {
        coding: true,
        music: false
      }
    };

    // Array
    let hobbies = ["reading", "music", "coding"];

    // Function
    function formatHobbies(list) {
      return list.join(", ");
    }

    // Using all data types in a meaningful way
    document.getElementById("name").textContent = name;
    document.getElementById("age").textContent = age + " (number)";
    document.getElementById("totalOrders").textContent = totalOrders + " (number)";
    document.getElementById("isActive").textContent = isActive ? "Yes" : "No";
    document.getElementById("address").textContent = address;
    document.getElementById("hobbies").textContent = formatHobbies(hobbies);
    document.getElementById("insurance").textContent = insurance ?? "No insurance";
    document.getElementById("consent").textContent = consentGiven ? "Yes" : "No";
    document.getElementById("lastLogin").textContent = lastLogin ?? "Not logged in yet";

    // BigInt and Symbol usage (for demonstration)
    let idSymbol = Symbol("id");
    user[idSymbol] = 1;

    let debugInfo = {
      nameType: typeof name,
      ageType: typeof age,
      totalSpentType: typeof totalSpent,
      hobbiesType: typeof hobbies,
      userType: typeof user,
      lastLoginType: typeof lastLogin,
      insuranceType: typeof insurance,
      totalSpentValue: totalSpent,
      symbolId: user[idSymbol]
    };

    document.getElementById("debugInfo").textContent =
      `name: ${debugInfo.nameType}, ` +
      `age: ${debugInfo.ageType}, ` +
      `totalSpent: ${debugInfo.totalSpentType}, ` +
      `hobbies: ${debugInfo.hobbiesType}, ` +
      `user: ${debugInfo.userType}, ` +
      `lastLogin: ${debugInfo.lastLoginType}, ` +
      `insurance: ${debugInfo.insuranceType}, ` +
      `totalSpentValue: ${debugInfo.totalSpentValue}, ` +
      `symbolId: ${debugInfo.symbolId}`;
  </script>
</body>
</html>
