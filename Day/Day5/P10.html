<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Styling</title>
    <style>
        h1{
            font-weight:bold;
            font-family: cursive;
        }
        span{
            font: italic bold 15px Arial, sans-serif; /*font shorthand*/
        }
        em{
            font-style: oblique;
        }
        cite{
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Text Styling: lets us control how text looks and behaves on a webpage.
        size, font,alignment, spacing and many more things.
        1. Font properties:
        >> font-family
        >> font-size
        >> font-weight
        >> font-style
        >> font shorthand
     -->
    <h1>Font Styling</h1>
    <span>font shorthand representing line</span>
    <p>lets us control <em>how text looks and behaves </em> on a <cite>webpage</cite></p>

</body>
</html>
