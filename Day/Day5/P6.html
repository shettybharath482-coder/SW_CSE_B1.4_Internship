<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB, RGBA colors</title>
    <style>
        p{    
            /* 0 - 255 */
            color: rgb(155,47,60);
        }
        h1{
            /* Transparency: 0 - 1 */
            color:rgba(195, 47, 59, 0.536);
        }
    </style>
</head>
<body>
    <p>Paragraph</p>
    <h1>Heading 1</h1>
   
</body>
</html>
