<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decendant selector</title>
    <style>
        div p{
                color: brown;
        }
    </style>
</head>
<body>
    <p>Targets elements inside other elements</p>
    <h1>Heading 1</h1>
  
    <div>
        <p>Paragraph 1</p>
    </div>
    
    <p>Paragraph 2</p>
</body>
</html>
