<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Group</title>
</head>
<body>
    <table border="1">
        <colgroup>
            <col>
            <col>
        </colgroup>
        <tr>
            <th>Name</th>
            <th>Score</th>
        </tr>
        <tr>
            <td>Suman</td>
            <td>86</td>
        </tr>
        <tr>
            <td>Revan</td>
            <td>91</td>
        </tr>
    </table>
</body>
</html>
