<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image responsiveness using CSS</title>

    <style>
        .responsive-image {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- src: source alt: alternate text | Self-closing tag -->
    <img src="images/i1.jpg" alt="Could not find the image">
    <img src="images/i2.jpg" alt="Could not find the image">

    <!-- Common attributes & variations -->

    <!-- Width & height -->
    <img src="images/i1.jpg" alt="Could not find the image" width="200" height="100">

    <!-- Tooltip -->
    <img src="images/i1.jpg" alt="Could not find the image" title="Image of a Dog">

    <!-- Style -->
    <img src="images/i1.jpg" alt="Could not find the image"
         style="width:200px; height:100px; border-radius:10%; border:2px solid #cd2323;">

    <!-- Image formats -->
    <!-- 1.Jpg 2.PNG 3.GIF 4.SVG 5.webp -->

    <!-- Responsive image via CSS -->
    <img src="images/i1.jpg" alt="Could not find the image" class="responsive-image">

</body>
</html>
